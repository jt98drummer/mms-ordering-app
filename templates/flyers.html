<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Order Documents — MMS</title>
<link rel="stylesheet" href="/static/style.css"></head><body>
<div class="topbar"><div class="inner">
  <img src="/asset/header_logo.png" alt="MMS"><div class="divider"></div>
  <div class="brandword">Branded Store<small>Print documents</small></div>
  <div class="nav"><a href="/">Home</a><a href="/cards">Cards</a><a href="/flyers">Documents</a></div>
</div></div><div class="redrule"></div>
<div class="modebar mode-{{mode}}">ORDER MODE: {{mode|upper}}</div>

<div class="wrap"><div class="grid2" style="grid-template-columns:1fr 320px">
  <div>
    <div class="filters">
      <button class="chip on" data-f="div" data-v="all" onclick="flt('div','all',this)">All</button>
      <button class="chip" data-f="div" data-v="MMS" onclick="flt('div','MMS',this)">MMS</button>
      <button class="chip" data-f="div" data-v="Signal" onclick="flt('div','Signal',this)">Signal</button>
      <span style="width:10px"></span>
      <button class="chip on" data-f="aud" data-v="all" onclick="flt('aud','all',this)">All</button>
      <button class="chip" data-f="aud" data-v="External" onclick="flt('aud','External',this)">Customer</button>
      <button class="chip" data-f="aud" data-v="Internal" onclick="flt('aud','Internal',this)">Internal</button>
    </div>
    <div class="docgrid" id="grid">
    {% for d in docs %}
      <div class="doc" data-div="{{d.division}}" data-aud="{{d.audience}}">
        <div class="th"><img src="/static/thumbs/{{d.thumb}}" alt=""></div>
        <div class="m">
          <div><span class="bdg {{'sig' if d.division=='Signal' else 'mms'}}">{{d.division}}</span>{% if d.audience=='Internal' %}<span class="bdg int">Internal</span>{% endif %}</div>
          <div class="nm2">{{d.title}}</div>
          <div class="ct"><select id="q_{{d.id}}"><option>25</option><option selected>50</option><option>100</option><option>250</option></select>
          <button class="add" onclick="add('{{d.id}}','{{d.title|replace("'","")}}')">Add</button></div>
        </div>
      </div>
    {% endfor %}
    </div>
  </div>

  <div class="panel">
    <h3 style="margin:0 0 12px;color:var(--navy)">Your Order</h3>
    <div id="cart"><div class="muted">No documents added yet.</div></div>
    <div id="ship" style="display:none">
      <h3 style="margin:16px 0 10px;color:var(--navy);font-size:15px">Ship to</h3>
      <div class="field"><input id="sfn" placeholder="First name"></div>
      <div class="field"><input id="sln" placeholder="Last name"></div>
      <div class="field"><input id="sa1" placeholder="Address line 1"></div>
      <div class="row2"><div class="field"><input id="sct" placeholder="City"></div><div class="field"><input id="sst" placeholder="State"></div></div>
      <div class="row2"><div class="field"><input id="szp" placeholder="ZIP"></div><div class="field"><input id="sph" placeholder="Phone"></div></div>
      <div class="field"><input id="sem" placeholder="Email"></div>
      <button class="btn full" onclick="submitDocs()">Place Order</button>
      <div class="note" id="msg"></div>
    </div>
  </div>
</div></div>

<script>
let cart={}, titles={}, filt={div:'all',aud:'all'};
function flt(t,v,el){filt[t]=v;el.parentNode.querySelectorAll('[data-f="'+t+'"]').forEach(b=>b.classList.remove('on'));el.classList.add('on');render();}
function render(){document.querySelectorAll('.doc').forEach(d=>{
  const ok=(filt.div=='all'||d.dataset.div==filt.div)&&(filt.aud=='all'||d.dataset.aud==filt.aud);
  d.style.display=ok?'flex':'none';});}
function add(id,title){const q=parseInt(document.getElementById('q_'+id).value,10);cart[id]=(cart[id]||0)+q;titles[id]=title;draw();}
function rm(id){delete cart[id];draw();}
function draw(){const ids=Object.keys(cart);const c=document.getElementById('cart');const s=document.getElementById('ship');
  if(!ids.length){c.innerHTML='<div class="muted">No documents added yet.</div>';s.style.display='none';return;}
  c.innerHTML=ids.map(id=>'<div class="citem"><span>'+titles[id]+'<br><span class="muted">Qty '+cart[id]+'</span></span><span class="cx" onclick="rm(\''+id+'\')">×</span></div>').join('');
  s.style.display='block';}
async function submitDocs(){const msg=document.getElementById('msg');msg.textContent='Submitting…';
  const items=Object.keys(cart).map(id=>({id:id,quantity:cart[id]}));
  const ship={firstName:sfn.value,lastName:sln.value,addressLine1:sa1.value,city:sct.value,state:sst.value,
    postCode:szp.value,country:'US',email:sem.value,phone:sph.value};
  try{const r=await fetch('/api/order/flyer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items,ship})});
    const j=await r.json();
    msg.innerHTML=j.ok?'✓ Order <b>'+j.order_id+'</b> ('+j.mode.toUpperCase()+'), '+j.items+' document(s).':'⚠ '+(j.error||('Gelato '+j.gelato_status));
    if(j.ok){cart={};draw();}
  }catch(e){msg.textContent='Error: '+e;}
}
</script></body></html>
