{% extends "base.html" %}
{% block title %}Swag Cart - MMS{% endblock %}
{% block content %}
<div class="wrap">
  <div class="subhead"><a href="/swag"><button class="back">&larr; Swag</button></a><h2>Your Swag Cart</h2><span class="sub" id="ccount"></span></div>
  <div id="cartArea"></div>
</div>
{% endblock %}
{% block scripts %}<script>
const ROLE='{{ user.role }}';
const PRIV={{ 'true' if user.role in PRIVILEGED else 'false' }};
const CAPS={units:{{ caps.emp_units }}, usd:{{ caps.emp_usd }}, fseUsd:{{ caps.fse_mgr_usd }}};
let pm='company', ack=false;

function line(it,i){
  const stepper='<div class="qtybox"><button onclick="chg('+i+',-1)">-</button><span>'+it.qty+'</span><button onclick="chg('+i+',1)">+</button></div>';
  return '<div class="citem"><div class="ci-ic">'+icon(it.icon)+'</div>'+
    '<div class="ci-main"><div class="ci-t">'+it.label+'</div><div class="ci-d">'+it.detail+'</div></div>'+
    '<div class="ci-r">'+stepper+'<button class="ci-remove" onclick="rm('+i+')">Remove</button></div></div>';
}
function swagItems(){ return cartGet().filter(i=>i.type==='swag'); }
function draw(){
  const c=swagItems(); const a=document.getElementById('cartArea');
  document.getElementById('ccount').textContent=c.length?c.length+' item type(s)':'';
  if(!c.length){ a.innerHTML='<div class="empty"><h3 style="color:#1e2d3b;margin:0 0 8px">Your cart is empty</h3><p style="margin:0 0 16px">The cart is just for swag &amp; apparel. Cards and documents check out on their own pages.</p><a class="btn" href="/swag">Back to swag</a></div>'; return; }
  const units=c.reduce((n,i)=>n+(i.qty||1),0), sub=c.reduce((s,i)=>s+(i.price||0)*(i.qty||1),0);
  const overEmp = (units>CAPS.units||sub>CAPS.usd);

  // payment option labels by role
  const coDesc = PRIV
    ? (sub>CAPS.fseUsd ? 'Over $'+CAPS.fseUsd+' - needs one approval, then places automatically' : 'Auto-approved (under $'+CAPS.fseUsd+') - places now, receipt to accounting')
    : 'Sent to your manager for approval, then places automatically. Receipt to accounting.';
  const empCapMsg = (!PRIV && overEmp)
    ? '<div class="capwarn">This order is over the employee company-card limit ('+CAPS.units+' units / $'+CAPS.usd+'). Trim the cart, or switch to your personal card.</div>' : '';

  a.innerHTML='<div class="cartwrap"><div class="panel">'+c.map(line).join('')+'</div>'+
   '<div class="summary"><h3>Checkout</h3>'+
     '<div class="sumrow"><span>Swag subtotal (est.)</span><span>$'+sub.toFixed(2)+'</span></div>'+
     '<div class="ctxbox"><h4>Order context <span class="req">*required</span></h4>'+
       '<div class="field"><label>Purpose</label><select id="x_purpose"><option value="">Select a purpose...</option>'+
         '<option>Customer visit</option><option>Trade show / event</option><option>Customer gift</option><option>New hire kit</option><option>Internal / team</option><option>Other</option></select></div>'+
       '<div class="field"><label>For whom / event</label><input id="x_recipient" placeholder="e.g. ACME site visit, or booth at Process Expo"></div>'+
       '<div class="field"><label>Justification</label><textarea id="x_just" rows="2" placeholder="Why these items are needed and for whom"></textarea></div>'+
     '</div>'+
     '<label style="font-weight:800;color:#1e2d3b;font-size:13px">Payment</label>'+
     '<label class="pay sel" id="payCo"><input type="radio" name="pay" checked onchange="setPm(\'company\')"><span><span class="pt">Company card (MMS)</span><br><span class="pd">'+coDesc+'</span></span></label>'+
     '<label class="pay" id="paySelf"><input type="radio" name="pay" onchange="setPm(\'personal\')"><span><span class="pt">My own card</span><br><span class="pd">Instant - <b>NOT reimbursable</b>, no approval needed</span></span></label>'+
     '<div id="ackWrap" style="display:none"><label class="ack"><input type="checkbox" id="ackBox" onchange="ack=this.checked"><span>I understand a personal-card order is <b>NOT reimbursable</b> and will not be sent to accounting for repayment.</span></label></div>'+
     empCapMsg+
     '<h3 style="margin:14px 0 8px">Ship to</h3>'+
     '<div class="row2"><div class="field"><label>First name</label><input id="s_fn" value="Jayce"></div><div class="field"><label>Last name</label><input id="s_ln" value="Tomlin"></div></div>'+
     '<div class="field"><label>Address line 1</label><input id="s_a1" placeholder="123 Main St"></div>'+
     '<div class="row2"><div class="field"><label>City</label><input id="s_ct"></div><div class="field"><label>State</label><input id="s_st" placeholder="IA"></div></div>'+
     '<div class="row2"><div class="field"><label>ZIP</label><input id="s_zp"></div><div class="field"><label>Phone</label><input id="s_ph" value="555-123-4567"></div></div>'+
     '<button class="btn full gold" style="margin-top:14px" id="placeBtn" onclick="checkout()">Place swag order</button>'+
     '<div class="fineprint">Swag &amp; apparel is routed to the MMS swag vendor. Context is required so accounting has the reason on file.</div>'+
   '</div></div>';
  psel();
}
function setPm(v){ pm=v; document.getElementById('ackWrap').style.display=(v==='personal')?'block':'none'; psel(); }
function psel(){ const a=document.getElementById('payCo'),b=document.getElementById('paySelf'); if(a&&b){a.classList.toggle('sel',pm==='company');b.classList.toggle('sel',pm==='personal');} }
function rm(i){ const c=cartGet(); const sw=swagItems()[i]; const idx=c.indexOf(sw); if(idx>-1)c.splice(idx,1); cartSave(c); draw(); }
function chg(i,d){ const c=cartGet(); const sw=swagItems()[i]; const idx=c.indexOf(sw); if(idx<0)return;
  c[idx].qty=Math.max(1,(c[idx].qty||1)+d); if(c[idx].detail){c[idx].detail=c[idx].detail.replace(/^\d+/,c[idx].qty);} cartSave(c); draw(); }
function modal(t,b){ document.getElementById('mTitle').textContent=t; document.getElementById('mBody').innerHTML=b; document.getElementById('modalBg').classList.add('show'); }
async function checkout(){
  const g=id=>document.getElementById(id).value;
  const ctx={purpose:g('x_purpose'),recipient:g('x_recipient'),justification:g('x_just')};
  if(!ctx.purpose||!ctx.justification.trim()){ modal('Context required','Please choose a purpose and add a short justification - both groups need this on file.'); return; }
  if(pm==='personal' && !ack){ modal('Please acknowledge','Tick the box confirming personal-card orders are NOT reimbursable.'); return; }
  const ship={firstName:g('s_fn'),lastName:g('s_ln'),addressLine1:g('s_a1'),city:g('s_ct'),state:g('s_st'),postCode:g('s_zp'),country:'US',email:'{{ user.email }}',phone:g('s_ph')};
  if(!ship.addressLine1||!ship.city){ modal('Add a shipping address','Please fill in at least address line 1 and city.'); return; }
  document.getElementById('placeBtn').textContent='Placing order...';
  try{
    const r=await fetch('/api/checkout/swag',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({items:swagItems(),context:ctx,payment:pm,ack_not_reimbursable:ack,ship})});
    const j=await r.json();
    if(j.ok){
      let msg='Order <b>'+j.order_id+'</b>. ';
      if(j.status==='pending') msg+='<br><br>'+j.message;
      else if(j.paid==='personal') msg+='<br><br>'+j.message;
      else msg+='<br><br>'+(j.message||'Placed. Receipt sent to accounting.');
      msg+='<br><br><i>(Demo - nothing was really produced or charged.)</i>';
      // clear only swag items
      cartSave(cartGet().filter(i=>i.type!=='swag'));
      modal(j.status==='pending'?'Sent for approval':'Order placed!', msg);
    } else { modal('Could not place order', j.error||'Something went wrong.'); }
  }catch(e){ modal('Error', String(e)); }
  const b=document.getElementById('placeBtn'); if(b) b.textContent='Place swag order';
}
draw();
</script>{% endblock %}
